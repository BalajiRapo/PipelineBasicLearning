<template>
    <lightning-card title="Update Record" icon-name="standard:account">
        <div class="slds-p-around_medium">
            <lightning-input
                type="text"
                label="Name"
                value={editedName}
                onchange={handleNameChange}>
            </lightning-input>

            <lightning-input
                type="text"
                label="Phone"
                value={editedPhone}
                onchange={handlePhoneChange}>
            </lightning-input>

            <lightning-input
                type="text"
                label="Industry"
                value={editedIndustry}
                onchange={handleIndustryChange}>
            </lightning-input>
        </div>

        <div class="slds-p-around_medium">
            <lightning-button
                label="Update Record"
                variant="brand"
                onclick={handleUpdate}>
            </lightning-button>
        </div>
    </lightning-card>
</template>
