<template>
    <lightning-card title="Account Finder" icon-name="custom:custom63">
        <div class="slds-m-around_medium">
            <lightning-input 
                type="number" 
                label="Minimum Annual Revenue" 
                value={annualRevenue} 
                onchange={handleInputChange}>
            </lightning-input>
        </div>
        <template if:true={accounts}>
            <ul>
                <template for:each={accounts} for:item="account">
                    <li key={account.Id}>{account.Name} - {account.AnnualRevenue}</li>
                </template>
            </ul>
        </template>
        <template if:true={error}>
            <p>{error.body.message}</p>
        </template>
    </lightning-card>
</template>
